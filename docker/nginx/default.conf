##############################################################################
# KO: WORKS — AmoCRM Deal Distribution Widget — Nginx config
# Domain: dist.koagency.me (subdomain, main site untouched)
##############################################################################

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name dist.koagency.me;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://dist.koagency.me$request_uri;
    }
}

# HTTPS — main server
server {
    listen 443 ssl;
    http2  on;
    server_name dist.koagency.me;

    ssl_certificate     /etc/letsencrypt/live/dist.koagency.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dist.koagency.me/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           DENY                                            always;
    add_header X-Content-Type-Options    nosniff                                         always;
    add_header X-XSS-Protection          "1; mode=block"                                 always;

    root  /app/public;
    index index.php;

    client_max_body_size 4m;

    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log  warn;

    location / {
        try_files $uri /index.php$is_args$args;
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass   app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param  DOCUMENT_ROOT   $realpath_root;
        fastcgi_intercept_errors on;
        internal;
    }

    location ~ \.php$ { return 404; }
    location ~ /\.     { deny all; }
}
