services:

  # ── PHP-FPM application ───────────────────────────────────────────────────
  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      STORAGE_PATH: /storage
    volumes:
      - storage:/storage
    networks:
      - internal

  # ── Nginx — HTTP + HTTPS reverse proxy ───────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    networks:
      - internal
      - external
    depends_on:
      - app

  # ── Certbot — получение и авторенью Let's Encrypt ────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"
    profiles:
      - certbot

volumes:
  storage:
  letsencrypt:
  certbot_webroot:

networks:
  internal:
    internal: true
  external:
