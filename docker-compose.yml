services:

  # ── PHP-FPM application ───────────────────────────────────────────────────
  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      STORAGE_PATH: /storage
    volumes:
      - storage:/storage
      - ./server:/app          # mount source for easy development; remove in prod
    networks:
      - internal
    depends_on: []

  # ── Nginx — HTTP + HTTPS reverse proxy ───────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro          # mount your certs here
      - storage:/storage:ro
    networks:
      - internal
      - external
    depends_on:
      - app

  # ── Certbot — auto-renew Let's Encrypt certs (optional) ──────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - ./docker/nginx/ssl:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew --webroot -w /var/www/certbot --quiet;
               sleep 12h & wait $${!};
             done"
    profiles:
      - certbot           # only starts with: docker compose --profile certbot up

volumes:
  storage:
  certbot_webroot:

networks:
  internal:
    internal: true
  external:
